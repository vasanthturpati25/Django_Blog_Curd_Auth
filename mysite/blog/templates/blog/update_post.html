{% extends 'blog/base.html' %}

{% block content %}
<h2>Edit Post</h2>

<form method="POST">
{% csrf_token %}
<input type="text" name="title" value="{{ post.title }}" placeholder="Title"><br><br>
<textarea name="content" placeholder="Content">{{ post.content }}</textarea><br><br>
<button type="submit">Update</button>
</form>
{% endblock %}
