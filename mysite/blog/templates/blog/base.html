<!DOCTYPE html>
<html>
<head>
<title>{% block title %}My Blog{% endblock %}</title>
</head>

<style>
body {
    font-family: Arial;
    background:#f4f4f4;
    margin:0;
}

nav {
    background:#333;
    color:white;
    padding:10px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo {
    font-size:20px;
}

.center-text {
    flex: 1;
    text-align: center;
    font-size:16px;
}

.links {
    display:flex;
    align-items:center;
}

.links a {
    color:white;
    margin-left:15px;
    text-decoration:none;
}

.links a:hover {
    text-decoration: underline;
}

.username {
    font-weight:bold;
    color:#ffd700;
}

.container {
    width:800px;
    margin:20px auto;
    background:white;
    padding:20px;
}
</style>

<body>

<nav>
    <div class="logo">My Blog</div>

    <div class="center-text">
        {% if user.is_authenticated %}
            Welcome, <span class="username">{{ user.username }}</span>
        {% else %}
            Welcome to My Blog
        {% endif %}
    </div>

    <div class="links">
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'about' %}">About</a>

        {% if user.is_authenticated %}
            <a href="{% url 'create_post' %}">Create</a>
            <a href="{% url 'logout' %}">Logout</a>
        {% else %}
            <a href="{% url 'login' %}">Login</a>
            <a href="{% url 'register' %}">Register</a>
        {% endif %}
    </div>
</nav>

<div class="container">

{% for message in messages %}
<p>{{ message }}</p>
{% endfor %}

{% block content %}{% endblock %}

</div>

</body>
</html>
