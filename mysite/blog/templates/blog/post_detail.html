{% extends 'blog/base.html' %}

{% block content %}
<h2>{{ post.title }}</h2>
<p>{{ post.content }}</p>
<p><b>Author:</b> {{ post.author.username }}</p>

{% if post.author == user %}
    <a href="{% url 'post_update' post.id %}">Edit</a>
    <a href="{% url 'delete_post' post.id %}">Delete</a>
{% endif %}
{% endblock %}
